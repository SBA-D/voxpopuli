<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPopuli - Master Admin Painel</title>
    <style>
        :root { --bg-main: #0a0e1a; --bg-card: #121829; --bg-input: #172036; --border-color: #222f4d; --accent-blue: #3b82f6; --accent-green: #10b981; --accent-red: #ef4444; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-main); color: #fff; margin:0; padding:0; }
        .header { background: var(--bg-card); padding: 18px 30px; border-bottom: 1px solid var(--border-color); font-size: 22px; font-weight: bold; color: #3b82f6; }
        .grid-master { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; padding: 30px; max-width: 1400px; margin: 0 auto; }
        .box-adm { background: var(--bg-card); border: 1px solid var(--border-color); padding: 25px; border-radius: 12px; }
        .box-adm h2 { margin-top: 0; font-size: 18px; color: #fff; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
        input, select { flex: 1; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-color); color:#fff; border-radius: 6px; font-size: 14px; }
        .btn-master { padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; font-size: 14px; }
        .btn-master:hover { opacity: 0.9; }
        .btn-blue { background: var(--accent-blue); color:#fff; }
        .btn-green { background: var(--accent-green); color:#000; }
        .btn-red { background: var(--accent-red); color:#fff; }
        .lista-itens { max-height: 280px; overflow-y: auto; margin-top: 15px; }
        .item-row { background: var(--bg-input); padding: 12px 15px; border-radius: 6px; margin-bottom: 10px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 13px; }
        th { color: #6b7280; font-size: 11px; text-transform: uppercase; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="header">VoxPopuli - Administração Master Core 🛠️</div>

<div class="grid-master">
    <div class="box-adm">
        <h2>📊 Lançar Novo Mercado / Enquete</h2>
        <div class="form-row">
            <input type="text" id="enqAtivo" placeholder="Nome do Ativo (Ex: BTC/USD, Flamengo)">
            <select id="enqTipo">
                <option value="financeiro">Mercado Financeiro</option>
                <option value="esportes">Esportes</option>
            </select>
        </div>
        <div class="form-row">
            <input type="text" id="enqOp1" placeholder="Opção 1 (Ex: Sobe / Alvo acima)">
            <input type="text" id="enqOp2" placeholder="Opção 2 (Ex: Desce / Alvo abaixo)">
        </div>
        <div class="form-row">
            <input type="text" id="enqPrecoAlvo" placeholder="Parâmetro/Preço Alvo (Ex: 65.200, Vitória)">
            <input type="date" id="enqDataFim">
            <input type="time" id="enqHoraFim">
        </div>
        <button class="btn-master btn-blue" style="width:100%;" onclick="criarEnquete()">Publicar no Painel dos Membros</button>
    </div>

    <div class="box-adm">
        <h2>⚡ Liquidar e Finalizar Enquetes Ativas (Com Rateio Automático)</h2>
        <div class="lista-itens" id="admListaEnquetes"></div>
    </div>

    <div class="box-adm">
        <h2>📥 Validar Depósitos PIX Recebidos</h2>
        <div class="lista-itens" id="admListaDepositos"></div>
    </div>

    <div class="box-adm">
        <h2>📤 Processar Pedidos de Saque</h2>
        <div class="lista-itens" id="admListaSaques"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://fkwkhfkeyfgsqerhpzpm.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrd2toZmtleWZnc3FlcmhwenBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwODgxNzksImV4cCI6MjA5ODY2NDE3OX0.F7w89Yyl6tn7KHwUxw4QG0mZ1lNHi2zxe_b6c590AFc"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function inicializarPainel() {
        await listarEnquetesAdm();
        await listarDepositosAdm();
        await listarSaquesAdm();
    }

    async function criarEnquete() {
        const ativo = document.getElementById('enqAtivo').value.trim();
        const tipo = document.getElementById('enqTipo').value;
        const op1 = document.getElementById('enqOp1').value.trim();
        const op2 = document.getElementById('enqOp2').value.trim();
        const precoAlvo = document.getElementById('enqPrecoAlvo').value.trim();
        const dataFim = document.getElementById('enqDataFim').value;
        const horaFim = document.getElementById('enqHoraFim').value;

        if(!ativo || !op1 || !op2 || !dataFim) return alert("Preencha todos os campos obrigatórios.");

        await _supabase.from('enquetes').insert([{
            ativo: ativo, tipo: tipo, op1: op1, op2: op2, preco_alvo: precoAlvo,
            data_fim: dataFim, hora_fim: horaFim, finalizada: false, pausada: false
        }]);

        alert("Mercado criado com sucesso!");
        inicializarPainel();
    }

    async function listarEnquetesAdm() {
        let { data: enquetes } = await _supabase.from('enquetes').select('*').eq('finalizada', false);
        const container = document.getElementById('admListaEnquetes');
        container.innerHTML = '';

        if(!enquetes || enquetes.length === 0) {
            container.innerHTML = `<p style="color:#6b7280;">Nenhuma enquete ativa no momento.</p>`;
            return;
        }

        enquetes.forEach(enq => {
            container.innerHTML += `<div class="item-row" style="flex-direction:column; align-items:flex-start; gap:10px;">
                <div><b>${enq.ativo}</b> (${enq.tipo.toUpperCase()})</div>
                <div class="form-row" style="width:100%;">
                    <button class="btn-master btn-green" style="padding:6px 12px; font-size:12px;" onclick="liquidarEnqueteComRateio(${enq.id}, '${enq.op1}', '${enq.ativo}')">Venceu: ${enq.op1}</button>
                    <button class="btn-master btn-green" style="padding:6px 12px; font-size:12px;" onclick="liquidarEnqueteComRateio(${enq.id}, '${enq.op2}', '${enq.ativo}')">Venceu: ${enq.op2}</button>
                    <button class="btn-master btn-red" style="padding:6px 12px; font-size:12px; background:#e67e22;" onclick="alternarPausaEnquete(${enq.id}, ${enq.pausada})">${enq.pausada ? 'Despausar' : 'Pausar/Suspender'}</button>
                </div>
            </div>`;
        });
    }

    async function alternarPausaEnquete(id, statusAtual) {
        await _supabase.from('enquetes').update({ pausada: !statusAtual }).eq('id', id);
        inicializarPainel();
    }

    async function liquidarEnqueteComRateio(enqueteId, opcaoVencedora, nomeAtivo) {
        if(!confirm(`Confirmar vitória de "${opcaoVencedora}" com cálculo de rateio?`)) return;

        let { data: todasAsApostas } = await _supabase.from('apostas').select('*').eq('enquete_id', enqueteId);
        
        if(todasAsApostas && todasAsApostas.length > 0) {
            let poteTotal = 0;
            let poteVencedores = 0;
            let vencedores = [];
            let perdedores = [];

            todasAsApostas.forEach(aposta => {
                poteTotal += parseFloat(aposta.valor);
                if(aposta.palpite === opcaoVencedora) {
                    poteVencedores += parseFloat(aposta.valor);
                    vencedores.push(aposta);
                } else {
                    perdedores.push(aposta);
                }
            });

            // 1. PROCESSAR OS VENCEDORES
            if(vencedores.length > 0 && poteVencedores > 0) {
                for(let vencedor of vencedores) {
                    let proporcao = parseFloat(vencedor.valor) / poteVencedores;
                    let premioGanho = poteTotal * proporcao;

                    let { data: u } = await _supabase.from('usuarios').select('saldo').eq('username', vencedor.usuario.trim()).single();
                    let saldoNovo = parseFloat(u.saldo || 0) + premioGanho;

                    await _supabase.from('usuarios').update({ saldo: saldoNovo }).eq('username', vencedor.usuario.trim());
                    
                    await _supabase.from('transacoes').insert([{
                        usuario: vencedor.usuario.trim(),
                        tipo: 'lucro_enquete',
                        descricao: `Acertou a enquete [${nomeAtivo}] - Recebeu Rateio`,
                        valor: premioGanho
                    }]);
                }
            }

            // 2. PROCESSAR OS PERDEDORES
            if(perdedores.length > 0) {
                for(let perdedor of perdedores) {
                    await _supabase.from('transacoes').insert([{
                        usuario: perdedor.usuario.trim(),
                        tipo: 'perda_enquete',
                        descricao: `Errou a enquete [${nomeAtivo}] - Palpite: ${perdedor.palpite}`,
                        valor: -parseFloat(perdedor.valor)
                    }]);
                }
            }
        }

        await _supabase.from('enquetes').update({ finalizada: true }).eq('id', enqueteId);
        alert("Mercado liquidado com extratos gerados para membros!");
        inicializarPainel();
    }

    async function listarDepositosAdm() {
        let { data: deps } = await _supabase.from('depositos').select('*').eq('status', 'pendente');
        const container = document.getElementById('admListaDepositos');
        container.innerHTML = '';

        if(!deps || deps.length === 0) {
            container.innerHTML = `<p style="color:#6b7280;">Nenhum depósito aguardando aprovação.</p>`;
            return;
        }

        deps.forEach(d => {
            container.innerHTML += `<div class="item-row">
                <div>👤 <b>${d.usuario}</b> enviou R$ ${Number(d.valor).toFixed(2)}</div>
                <button class="btn-master btn-green" style="padding:6px 12px; font-size:12px;" onclick="aprovarDeposito(${d.id}, '${d.usuario}', ${d.valor})">Aprovar PIX</button>
            </div>`;
        });
    }

    async function aprovarDeposito(id, usuario, valor) {
        const usuarioLimpo = usuario ? usuario.trim() : "";
        let { data: u } = await _supabase.from('usuarios').select('saldo').eq('username', usuarioLimpo).single();
        let saldoAtual = u ? parseFloat(u.saldo || 0) : 0;

        await _supabase.from('usuarios').update({ saldo: saldoAtual + parseFloat(valor) }).eq('username', usuarioLimpo);
        await _supabase.from('depositos').update({ status: 'aprovado' }).eq('id', id);
        
        await _supabase.from('transacoes').insert([{
            usuario: usuarioLimpo,
            tipo: 'deposito',
            descricao: `Depósito via PIX aprovado com sucesso`,
            valor: parseFloat(valor)
        }]);

        alert("Depósito computado!");
        inicializarPainel();
    }

    async function listarSaquesAdm() {
        let { data: saqs } = await _supabase.from('saques').select('*').eq('status', 'pendente');
        const container = document.getElementById('admListaSaques');
        container.innerHTML = '';

        if(!saqs || saqs.length === 0) {
            container.innerHTML = `<p style="color:#6b7280;">Nenhum pedido de retirada na fila.</p>`;
            return;
        }

        saqs.forEach(s => {
            container.innerHTML += `<div class="item-row" style="flex-direction:column; align-items:flex-start; gap:5px;">
                <div>👤 <b>${s.usuario}</b> solicita <b>R$ ${Number(s.valor).toFixed(2)}</b></div>
                <div style="font-size:11px; color:#9ca3af;">Chave PIX: ${s.chave_pix}</div>
                <button class="btn-master btn-red" style="padding:6px 12px; font-size:12px; width:100%; margin-top:5px;" onclick="aprovarSaque(${s.id}, '${s.usuario}', ${s.valor})">Confirmar Pagamento Efetuado</button>
            </div>`;
        });
    }

    async function aprovarSaque(id, usuario, valor) {
        const usuarioLimpo = usuario ? usuario.trim() : "";
        let { data: u } = await _supabase.from('usuarios').select('saldo').eq('username', usuarioLimpo).single();
        let saldoAtual = u ? parseFloat(u.saldo || 0) : 0;

        await _supabase.from('usuarios').update({ saldo: saldoAtual - parseFloat(valor) }).eq('username', usuarioLimpo);
        await _supabase.from('saques').update({ status: 'aprovado' }).eq('id', id);
        
        await _supabase.from('transacoes').insert([{
            usuario: usuarioLimpo,
            tipo: 'saque',
            descricao: `Saque via PIX enviado para sua conta bancária`,
            valor: -parseFloat(valor)
        }]);

        alert("Retirada concluída e processada no extrato!");
        inicializarPainel();
    }

    window.onload = function() {
        inicializarPainel();
    };
</script>
</body>
</html>
