<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPopuli - Super Admin Engine (Cloud)</title>
    <style>
        :root { --bg-main: #060913; --bg-card: #0d1222; --bg-input: #111728; --border-color: #1a2238; --accent-blue: #4371f7; --accent-green: #00b37e; --accent-red: #f75a68; --text-muted: #7d859a; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .header-left h1 { color: var(--accent-blue); font-size: 28px; margin: 0; font-weight: 800; }
        .card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 24px; border-radius: 14px; margin-bottom: 20px; }
        h2 { font-size: 18px; margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        input, select { width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid #1c253d; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-blue { background: var(--accent-blue); color: white; width: 100%; }
        .btn-success { background: var(--accent-green); color: #0d1222; font-size: 12px; padding: 8px 12px; border-radius: 6px; }
        .btn-danger { background: var(--accent-red); color: white; font-size: 12px; padding: 8px 12px; border-radius: 6px; }
        .btn-warn { background: #ff9f43; color: #0d1222; padding: 8px 12px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-muted); text-transform: uppercase; font-size: 11px; }
        .caixa-box { background: #091a18; border: 1px solid var(--accent-green); padding: 15px; border-radius: 10px; font-size: 20px; font-weight: bold; color: var(--accent-green); display: inline-block; margin-bottom: 15px; }
        .pote-badge { background: #1c253d; padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #ff9f43; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <div class="admin-header">
        <div class="header-left"><h1>VoxPopuli - Painel Administrativo</h1></div>
        <button class="btn" style="background:#202431; color:var(--text-muted);" onclick="localStorage.removeItem('usuarioLogado'); window.location.href='./index.html';">Sair</button>
    </div>

    <div class="card">
        <h2>💰 Caixa Geral da Plataforma</h2>
        <div class="caixa-box">🏦 Total em Custódia: R$ <span id="caixaPlataforma">0.00</span></div>
    </div>

    <div class="card">
        <h2>🎯 Controle de Enquetes</h2>
        <table>
            <thead><tr><th>Ativo / Mercado</th><th>Volume Acumulado</th><th>Ações</th><th>Liquidação</th></tr></thead>
            <tbody id="listaRodadasAbertas"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>🚀 Injetar Nova Rodada</h2>
        <div class="grid-2">
            <div><label>Tipo</label><select id="enqTipo"><option value="financeiro">📊 Mercado Financeiro</option><option value="esportes">⚽ Esportes</option></select></div>
            <div><label>Ativo / Confronto</label><input type="text" id="enqAtivo" placeholder="Ex: BTC/USDT"></div>
        </div>
        <div class="grid-3">
            <div><label>Alvo / Referência</label><input type="text" id="enqPrecoAlvo" placeholder="Preço Alvo"></div>
            <div><label>Opção 1</label><input type="text" id="enqOp1" value="Acima"></div>
            <div><label>Opção 2</label><input type="text" id="enqOp2" value="Abaixo"></div>
        </div>
        <div class="grid-2">
            <div><input type="date" id="enqDataFim"></div>
            <div><input type="time" id="enqHoraFim"></div>
        </div>
        <button class="btn btn-blue" onclick="criarEnquete()">Publicar Enquete</button>
    </div>
</div>

<script>
    // Trava rígida de segurança
    if(localStorage.getItem('usuarioLogado') !== 'voxadmin') {
        window.location.href = './index.html';
    }

    const SUPABASE_URL = "https://fkwkhfkeyfgsqerhpzpm.supabase.co";
    const SUPABASE_KEY = "sb_publishable_D35oaRAeby0oZmoUwfhl9A_guti3olc"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function inicializarPainel() {
        await calcularCaixaGeral();
        await renderizarRodadasAbertas();
    }

    async function calcularCaixaGeral() {
        let { data: users } = await _supabase.from('usuarios').select('saldo');
        let total = 0; if(users) users.forEach(u => total += parseFloat(u.saldo || 0));
        document.getElementById('caixaPlataforma').innerText = total.toFixed(2);
    }

    async function criarEnquete() {
        const tipo = document.getElementById('enqTipo').value;
        const ativo = document.getElementById('enqAtivo').value.trim();
        const op1 = document.getElementById('enqOp1').value;
        const op2 = document.getElementById('enqOp2').value;
        const data_fim = document.getElementById('enqDataFim').value;
        const hora_fim = document.getElementById('enqHoraFim').value;
        const preco_alvo = document.getElementById('enqPrecoAlvo').value;

        if(!ativo || !data_fim || !hora_fim) return alert("Preencha todos os campos obrigatórios.");

        const { error } = await _supabase.from('enquetes').insert([{ tipo, ativo, preco_alvo, op1, op2, data_fim, hora_fim, finalizada: false, pausada: false }]);
        if(error) return alert("Erro ao criar enquete: " + error.message);
        
        alert("Enquete publicada globalmente na Nuvem!");
        document.getElementById('enqAtivo').value = '';
        inicializarPainel();
    }

    async function renderizarRodadasAbertas() {
        let { data: enquetes } = await _supabase.from('enquetes').select('*').eq('finalizada', false);
        let { data: apostas } = await _supabase.from('apostas').select('*');
        const tbody = document.getElementById('listaRodadasAbertas'); tbody.innerHTML = '';

        if(enquetes) {
            enquetes.forEach(enq => {
                let totalPote = 0;
                if(apostas) apostas.forEach(a => { if(a.enquete_id == enq.id) totalPote += parseFloat(a.valor); });

                tbody.innerHTML += `<tr>
                    <td><b>${enq.ativo}</b><br><small>${enq.op1} vs ${enq.op2}</small></td>
                    <td><span class="pote-badge">R$ ${totalPote.toFixed(2)}</span></td>
                    <td><button class="btn-warn" onclick="togglePausa(${enq.id}, ${enq.pausada})">${enq.pausada ? '▶️ Liberar' : '⏸️ Pausar'}</button></td>
                    <td>
                        <button class="btn btn-success" onclick="liquidarEnquete(${enq.id}, '${enq.op1}')">${enq.op1}</button>
                        <button class="btn btn-danger" onclick="liquidarEnquete(${enq.id}, '${enq.op2}')">${enq.op2}</button>
                    </td>
                </tr>`;
            });
        }
    }

    async function togglePausa(id, status) {
        await _supabase.from('enquetes').update({ pausada: !status }).eq('id', id);
        renderizarRodadasAbertas();
    }

    async function liquidarEnquete(id, vencedor) {
        if(!confirm(`Confirmar vitória da opção "${vencedor}"?`)) return;
        await _supabase.from('enquetes').update({ finalizada: true }).eq('id', id);
        alert("Mercado finalizado com sucesso!");
        inicializarPainel();
    }

    inicializarPainel();
</script>
</body>
</html>
