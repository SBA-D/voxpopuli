<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Administrador</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121214; color: #fff; margin: 20px; }
        .card { background: #202024; padding: 20px; margin-top: 20px; border-radius: 8px; }
        input, select { padding: 10px; margin: 10px 0; background: #121214; color: #fff; border: 1px solid #29292e; border-radius: 4px; width: 100%; box-sizing: border-box;}
        button { padding: 10px 20px; background: #00b37e; border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold;}
        .notif-item { background: #29292e; padding: 10px; margin: 5px 0; border-radius: 4px; display: flex; justify-content: space-between;}
    </style>
</head>
<body>

<h2>⚙️ Painel de Administração</h2>
<button onclick="window.location.href='index.html'" style="background:#555;">Ir para o Login</button>

<div class="card">
    <h3>Criar Nova Enquete / Ativo</h3>
    <label>Tipo de Mercado:</label>
    <select id="tipoEnquete" onchange="mudarFormulario()">
        <option value="financeiro">Mercado Financeiro (Forex, Cripto, Ações, Índices)</option>
        <option value="esportes">Esportes (Futebol, Basquete, etc.)</option>
    </select>

    <label>Nome do Ativo ou Jogo (Ex: EUR/USD, BTC/USDT, PETR4, Mini Índice WIN, Real Madrid x Barcelona):</label>
    <input type="text" id="nomeAtivo" placeholder="Digite o ativo ou confronto">

    <button onclick="salvarEnquete()">Adicionar no Painel</button>
</div>

<div class="card">
    <h3>🔔 Notificações de Pedidos de Saque</h3>
    <div id="listaSaques">Nenhum pedido de saque pendente.</div>
</div>

<script>
    function mudarFormulario() {
        // Pode ser usado para customizar campos dinamicamente no futuro
    }

    function salvarEnquete() {
        const tipo = document.getElementById('tipoEnquete').value;
        const ativo = document.getElementById('nomeAtivo').value.trim();

        if(!ativo) return alert("Insira o nome do ativo ou do jogo.");

        let enquetes = JSON.parse(localStorage.getItem('enquetes')) || [];
        
        let novaEnquete = {
            tipo: tipo,
            ativo: ativo,
            op1: tipo === 'financeiro' ? 'Subir (Acima)' : 'Time A/Casa',
            op2: tipo === 'financeiro' ? 'Descer (Abaixo)' : 'Time B/Visitante',
            pergunta: tipo === 'financeiro' ? 'Fechará acima ou abaixo do fechamento anterior?' : 'Quem vencerá a partida?'
        };

        enquetes.push(novaEnquete);
        localStorage.setItem('enquetes', JSON.stringify(enquetes));
        alert("Enquete adicionada com sucesso!");
        document.getElementById('nomeAtivo').value = '';
    }

    function carregarPedidosSaque() {
        const saques = JSON.parse(localStorage.getItem('saques')) || [];
        const div = document.getElementById('listaSaques');
        if(saques.length === 0) {
            div.innerHTML = "Nenhum pedido de saque pendente.";
            return;
        }
        
        div.innerHTML = '';
        saques.forEach((s, idx) => {
            div.innerHTML += `
                <div class="notif-item">
                    <span>👤 <strong>${s.usuario}</strong> está solicitando o saque de <strong>${s.valor} moedas</strong>.</span>
                    <button onclick="pagarSaque(${idx})" style="background:#00b37e; padding:5px 10px;">Aprovar & Pagar</button>
                </div>
            `;
        });
    }

    function pagarSaque(idx) {
        let saques = JSON.parse(localStorage.getItem('saques'));
        saques.splice(idx, 1); // Remove da fila após pagar
        localStorage.setItem('saques', JSON.stringify(saques));
        alert("Saque aprovado e processado!");
        carregarPedidosSaque();
    }

    // Inicializa a lista de saques ao carregar
    carregarPedidosSaque();
</script>
</body>
</html>
