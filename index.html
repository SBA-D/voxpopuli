<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Apostas - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121214; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #202024; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 320px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #29292e; background: #121214; color: #fff; border-radius: 4px; box-sizing: border-box;}
        button { width: 100%; padding: 10px; background: #00b37e; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px;}
        button:hover { background: #00875f; }
        .toggle-link { color: #8d8d99; font-size: 14px; margin-top: 15px; display: inline-block; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <h2>Login</h2>
    <input type="text" id="loginUser" placeholder="Usuário">
    <input type="password" id="loginPass" placeholder="Senha">
    <button onclick="fazerLogin()">Entrar</button>
    <span class="toggle-link" onclick="alternarTelas()">Não tem conta? Cadastre-se</span>
</div>

<div class="container" id="cadastroBox" style="display: none;">
    <h2>Cadastro</h2>
    <input type="text" id="cadUser" placeholder="Escolha um Usuário">
    <input type="password" id="cadPass" placeholder="Escolha uma Senha">
    <button onclick="fazerCadastro()">Cadastrar</button>
    <span class="toggle-link" onclick="alternarTelas()">Já tem conta? Faça Login</span>
</div>

<script>
    // Inicializa o Admin padrão se não existir
    if(!localStorage.getItem('users')) {
        localStorage.setItem('users', JSON.stringify({ 'admin': { senha: 'admin', saldo: 0, adm: true } }));
    }

    function alternarTelas() {
        const login = document.getElementById('loginBox');
        const cadastro = document.getElementById('cadastroBox');
        if(login.style.display === 'none') {
            login.style.display = 'block';
            cadastro.style.display = 'none';
        } else {
            login.style.display = 'none';
            cadastro.style.display = 'block';
        }
    }

    function fazerCadastro() {
        const user = document.getElementById('cadUser').value.trim();
        const pass = document.getElementById('cadPass').value.trim();
        if(!user || !pass) return alert('Preencha todos os campos!');

        let users = JSON.parse(localStorage.getItem('users'));
        if(users[user]) return alert('Usuário já existe!');

        users[user] = { senha: pass, saldo: 0, adm: false };
        localStorage.setItem('users', JSON.stringify(users));
        alert('Cadastro realizado com sucesso!');
        alternarTelas();
    }

    function fazerLogin() {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        let users = JSON.parse(localStorage.getItem('users'));

        if(users[user] && users[user].senha === pass) {
            localStorage.setItem('usuarioLogado', user);
            if(users[user].adm) {
                window.location.href = 'adm.html';
            } else {
                window.location.href = 'painel.html';
            }
        } else {
            alert('Usuário ou senha incorretos!');
        }
    }
</script>
</body>
</html>
