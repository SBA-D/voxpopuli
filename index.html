<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPool - Login & Administração</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-principal: #0d0e12;
            --bg-card: #15171e;
            --bg-input: #1e222b;
            --bg-hover: #262936;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #2d3242;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ESTILOS DE AUTENTICAÇÃO (LOGIN / CADASTRO) */
        .auth-container {
            max-width: 400px;
            width: 100%;
            margin: auto;
            padding: 32px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .auth-logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-blue);
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-logo span { color: var(--accent-green); }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--accent-blue);
        }

        .auth-switch {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-switch span {
            color: var(--accent-blue);
            cursor: pointer;
            font-weight: 600;
        }

        /* BARRA DE NAVEGAÇÃO */
        nav {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent-blue);
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .logo span { color: var(--accent-green); }

        .menu-direita {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .wallet-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-green);
        }

        .btn-nav {
            background-color: var(--bg-input);
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }

        /* PAINEL ADMINISTRATIVO (ADM) */
        .adm-box {
            background: rgba(239, 68, 68, 0.05);
            border: 1px dashed var(--accent-red);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .adm-title {
            color: var(--accent-red);
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .adm-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-adm {
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }

        /* CONTEÚDO PRINCIPAL */
        main {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 16px;
            flex: 1;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        .titulo-secao {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* CARDS E ENQUETES */
        .poll-card {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            padding: 24px;
        }

        .prize-pool-box {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            border: 1px solid var(--accent-blue);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
        }

        .prize-value {
            font-size: 36px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-label {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .option-label.selected {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
        }

        .btn-action {
            width: 100%;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-action:disabled {
            background: #2d3242;
            color: #6b7280;
            cursor: not-allowed;
        }

        .store-grid { display: flex; flex-direction: column; gap: 16px; }
        .credit-card {
            background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border-color); padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .btn-buy-package { background: #1d4ed8; color: white; border: none; border-radius: 12px; padding: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div id="view-auth" class="view-section active" style="display: flex; min-height: 100vh; width: 100%;">
        <div class="auth-container">
            <div class="auth-logo">Vox<span>Pool</span></div>
            
            <div id="auth-forms">
                <div class="form-group">
                    <label>Login ou E-mail</label>
                    <input type="text" id="auth-login" class="form-control" placeholder="Ex: joao ou @admhelth">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="auth-senha" class="form-control" placeholder="••••••••">
                </div>
                <button class="btn-action" style="margin-top: 10px;" onclick="executarAutenticacao()">Entrar na Conta</button>
                
                <div class="auth-switch" id="btn-alternar-auth">
                    Não tem conta? <span onclick="alternarModoAuth()">Cadastre-se aqui</span>
                </div>
            </div>
        </div>
    </div>

    <div id="app-conteudo" style="display: none; flex-direction: column; min-height: 100vh;">
        <nav>
            <div class="nav-container">
                <div class="logo" onclick="navegarPara('view-enquetes')">Vox<span>Pool</span></div>
                <div class="menu-direita">
                    <div class="wallet-badge">🪙 <span id="saldo-atual">25</span> Crd.</div>
                    <button class="btn-nav" style="background: var(--accent-blue);" onclick="navegarPara('view-loja')">+ Loja</button>
                    <button class="btn-nav" onclick="fazerLogout()">Sair</button>
                </div>
            </div>
        </nav>

        <main>
            <div id="painel-adm" class="adm-box" style="display: none;">
                <div class="adm-title">🛡️ Modo Administrador Ativo (@admhelth)</div>
                <div class="adm-actions">
                    <button class="btn-adm" onclick="admZerarSaldoDemonstracao()">Zerar Saldo (Reset)</button>
                    <button class="btn-adm" style="background:#4b5563;" onclick="admConfigurarVotos()">Alterar Votos Base</button>
                </div>
            </div>

            <section id="view-enquetes" class="view-section">
                <div class="titulo-secao">
                    <span>Enquete em Destaque</span>
                    <span style="font-size: 12px; color: #ef4444; font-weight: 600;">⏱️ Ativa</span>
                </div>

                <div class="poll-card">
                    <div class="prize-pool-box">
                        <div style="font-size: 12px; color: #93c5fd; text-transform: uppercase; margin-bottom: 6px;">Valor em Jogo (Multiplicado 5x)</div>
                        <div class="prize-value" id="label-premio-total">R$ 2.500,00</div>
                        <div style="font-size: 12px; color: var(--text-muted);" id="label-base-calculo">Base: 100 Votos x R$ 5,00</div>
                    </div>

                    <div class="poll-question">Quem possui a maior torcida engajada e ativa no cenário nacional atual?</div>

                    <div class="options-group">
                        <label class="option-label" id="container-opt1" onclick="selecionarOpcao('opt1')">
                            <span>BOLSONARO</span> <span id="votos-opt1">45 votos</span>
                            <input type="radio" name="poll_opt" id="opt1" style="display:none">
                        </label>
                        <label class="option-label" id="container-opt2" onclick="selecionarOpcao('opt2')">
                            <span>LULA</span> <span id="votos-opt2">35 votos</span>
                            <input type="radio" name="poll_opt" id="opt2" style="display:none">
                        </label>
                        <label class="option-label" id="container-opt3" onclick="selecionarOpcao('opt3')">
                            <span>NENHUM DELES</span> <span id="votos-opt3">20 votos</span>
                            <input type="radio" name="poll_opt" id="opt3" style="display:none">
                        </label>
                    </div>

                    <button class="btn-action" id="btn-votar" onclick="processarVoto()">Confirmar Voto (1 Crédito)</button>
                </div>
            </section>

            <section id="view-loja" class="view-section">
                <div class="titulo-secao">
                    <button class="btn-nav" onclick="navegarPara('view-enquetes')">← Voltar</button>
                    <span>Loja de Créditos</span>
                </div>
                <div class="store-grid" id="container-pacotes"></div>
            </section>
        </main>
    </div>

    <script>
        // SISTEMA DE USUÁRIOS FICTÍCIOS NO LOCALSTORAGE
        let modoAuth = "LOGIN"; // LOGIN ou CADASTRO
        let usuarioLogado = null;

        const appState = {
            saldoCreditos: 25,
            votos: { opt1: 45, opt2: 35, opt3: 20 },
            opcaoSelecionada: null,
            jaVotou: false
        };

        const pacotesMoedas = [
            { qtd: 1, total: 9.00 }, { qtd: 5, total: 40.00 }, { qtd: 10, total: 70.00 },
            { qtd: 20, total: 130.00 }, { qtd: 50, total: 300.00 }, { qtd: 100, total: 550.00 },
            { qtd: 200, total: 1000.00 }, { qtd: 500, total: 2250.00 }, { qtd: 1000, total: 4000.00 }
        ];

        function alternarModoAuth() {
            modoAuth = (modoAuth === "LOGIN") ? "CADASTRO" : "LOGIN";
            document.getElementById('btn-alternar-auth').innerHTML = modoAuth === "LOGIN" 
                ? 'Não tem conta? <span onclick="alternarModoAuth()">Cadastre-se aqui</span>' 
                : 'Já tem uma conta? <span onclick="alternarModoAuth()">Faça Login</span>';
        }

        function executarAutenticacao() {
            const loginInput = document.getElementById('auth-login').value.trim();
            const senhaInput = document.getElementById('auth-senha').value.trim();

            if(!loginInput || !senhaInput) {
                alert("Preencha todos os campos!");
                return;
            }

            // CONTROLE DE ACESSO DO ADMINISTRADOR EXCLUSIVO
            if(loginInput === "@admhelth" && senhaInput === "2481") {
                usuarioLogado = { login: "@admhelth", role: "ADM" };
                logarSucesso();
                return;
            }

            let bancoUsuarios = JSON.parse(localStorage.getItem('voxpool_usuarios') || "{}");

            if(modoAuth === "CADASTRO") {
                if(bancoUsuarios[loginInput]) {
                    alert("Este usuário já existe!");
                    return;
                }
                bancoUsuarios[loginInput] = { senha: senhaInput, saldo: 25 };
                localStorage.setItem('voxpool_usuarios', JSON.stringify(bancoUsuarios));
                alert("Cadastro realizado! Faça login agora.");
                alternarModoAuth();
            } else {
                if(bancoUsuarios[loginInput] && bancoUsuarios[loginInput].senha === senhaInput) {
                    usuarioLogado = { login: loginInput, role: "USER" };
                    appState.saldoCreditos = bancoUsuarios[loginInput].saldo;
                    logarSucesso();
                } else {
                    alert("Usuário ou senha incorretos!");
                }
            }
        }

        function logarSucesso() {
            document.getElementById('view-auth').style.display = 'none';
            document.getElementById('app-conteudo').style.display = 'flex';
            
            // Ativa painel se for administrador
            if(usuarioLogado.role === "ADM") {
                document.getElementById('painel-adm').style.display = 'block';
            } else {
                document.getElementById('painel-adm').style.display = 'none';
            }

            navegarPara('view-enquetes');
            atualizarPainelPremio();
        }

        function fazerLogout() {
            usuarioLogado = null;
            document.getElementById('auth-login').value = '';
            document.getElementById('auth-senha').value = '';
            document.getElementById('app-conteudo').style.display = 'none';
            document.getElementById('view-auth').style.display = 'flex';
        }

        // FUNÇÕES DO ADMINISTRADOR (ADM)
        function admZerarSaldoDemonstracao() {
            appState.saldoCreditos = 0;
            appState.votos = { opt1: 0, opt2: 0, opt3: 0 };
            appState.jaVotou = false;
            document.getElementById('btn-votar').disabled = false;
            document.getElementById('btn-votar').innerText = "Confirmar Voto (1 Crédito)";
            document.querySelectorAll('.option-label').forEach(el => el.classList.remove('selected'));
            atualizarPainelPremio();
            alert("Administração: Todo o saldo e votos da simulação foram ZERADOS!");
        }

        function admConfigurarVotos() {
            const v1 = parseInt(prompt("Votos Bolsonaro:", appState.votos.opt1) || 0);
            const v2 = parseInt(prompt("Votos Lula:", appState.votos.opt2) || 0);
            const v3 = parseInt(prompt("Votos Nenhum:", appState.votos.opt3) || 0);
            
            appState.votos.opt1 = v1;
            appState.votos.opt2 = v2;
            appState.votos.opt3 = v3;
            atualizarPainelPremio();
        }

        // LÓGICA CORE DA ENQUETE E LOJA
        function atualizarPainelPremio() {
            const totalVotos = appState.votos.opt1 + appState.votos.opt2 + appState.votos.opt3;
            const valorEmJogo = (totalVotos * 5.00) * 5;

            document.getElementById('label-premio-total').innerText = `R$ ${valorEmJogo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('label-base-calculo').innerText = `Base: ${totalVotos} Votos x R$ 5,00 (Multiplicado 5x)`;
            
            document.getElementById('votos-opt1').innerText = `${appState.votos.opt1} votos`;
            document.getElementById('votos-opt2').innerText = `${appState.votos.opt2} votos`;
            document.getElementById('votos-opt3').innerText = `${appState.votos.opt3} votos`;
            document.getElementById('saldo-atual').innerText = appState.saldoCreditos;

            // Sincroniza saldo se for usuário comum
            if(usuarioLogado && usuarioLogado.role !== "ADM") {
                let bancoUsuarios = JSON.parse(localStorage.getItem('voxpool_usuarios') || "{}");
                if(bancoUsuarios[usuarioLogado.login]) {
                    bancoUsuarios[usuarioLogado.login].saldo = appState.saldoCreditos;
                    localStorage.setItem('voxpool_usuarios', JSON.stringify(bancoUsuarios));
                }
            }
        }

        function selecionarOpcao(idOpcao) {
            if(appState.jaVotou) return;
            document.querySelectorAll('.option-label').forEach(el => el.classList.remove('selected'));
            document.getElementById(`container-${idOpcao}`).classList.add('selected');
            appState.opcaoSelecionada = idOpcao;
        }

        function processarVoto() {
            if (!appState.opcaoSelecionada) { alert("Selecione uma opção!"); return; }
            if (appState.saldoCreditos < 1) { alert("Saldo insuficiente!"); navegarPara('view-loja'); return; }

            appState.saldoCreditos -= 1;
            appState.votos[appState.opcaoSelecionada] += 1;
            appState.jaVotou = true;

            document.getElementById('btn-votar').disabled = true;
            document.getElementById('btn-votar').innerText = "Voto Computado!";
            atualizarPainelPremio();
        }

        function comprarCreditos(quantidade) {
            appState.saldoCreditos += quantidade;
            atualizarPainelPremio();
            alert(`+${quantidade} créditos adicionados com sucesso!`);
            navegarPara('view-enquetes');
        }

        function renderizarLoja() {
            const grid = document.getElementById('container-pacotes');
            grid.innerHTML = '';
            pacotesMoedas.forEach(p => {
                grid.innerHTML += `
                    <div class="credit-card">
                        <div style="display:flex; justify-content:space-between; font-weight:700;">
                            <span>${p.qtd} Créditos</span>
                            <span>R$ ${p.total.toFixed(2)}</span>
                        </div>
                        <button class="btn-buy-package" onclick="comprarCreditos(${p.qtd})">Comprar Pacote</button>
                    </div>`;
            });
        }

        function navegarPara(idVisao) {
            document.querySelectorAll('.view-section').forEach(secao => secao.style.display = 'none');
            document.getElementById(idVisao).style.display = 'block';
            if(idVisao === 'view-auth') document.getElementById(idVisao).style.display = 'flex';
        }

        window.onload = function() {
            renderizarLoja();
        };
    </script>
</body>
</html>
