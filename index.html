<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPopuli - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #060913; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #0d1222; padding: 35px 25px; border-radius: 16px; border: 1px solid #1a2238; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 340px; text-align: center; box-sizing: border-box; }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .logo { font-size: 32px; font-weight: bold; color: #4371f7; letter-spacing: 0.5px; }
        .logo-emoji { font-size: 28px; }
        h2 { font-size: 20px; margin-top: 0; margin-bottom: 25px; font-weight: 600; }
        .input-group { text-align: left; margin-bottom: 18px; }
        .input-group label { display: block; font-size: 14px; color: #7d859a; margin-bottom: 8px; }
        input { width: 100%; padding: 14px; border: 1px solid #1c253d; background: #111728; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        input:focus { outline: none; border-color: #4371f7; }
        button { width: 100%; padding: 14px; background: #0640df; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; font-size: 16px; transition: background 0.2s; }
        button:hover { background: #022cb3; }
        .toggle-link { color: #7d859a; font-size: 13px; margin-top: 25px; display: block; cursor: pointer; text-decoration: none; }
        .toggle-link span { color: #4371f7; font-weight: bold; }
        .toggle-link span:hover { text-decoration: underline; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container" id="loginBox">
    <div class="logo-container">
        <div class="logo">VoxPopuli</div>
        <div class="logo-emoji">📈</div>
    </div>
    <h2>Acessar Painel</h2>
    <div class="input-group">
        <label>Usuário / ID</label>
        <input type="text" id="loginUser" placeholder="Digite seu usuário">
    </div>
    <div class="input-group">
        <label>Senha</label>
        <input type="password" id="loginPass" placeholder="Digite sua senha">
    </div>
    <button onclick="fazerLogin()">Entrar no Painel</button>
    <div class="toggle-link" onclick="mostrarCadastro()">Não tem uma conta? <span>Cadastre-se aqui</span></div>
</div>

<div class="container" id="cadastroBox" style="display: none;">
    <div class="logo-container">
        <div class="logo">VoxPopuli</div>
        <div class="logo-emoji">📈</div>
    </div>
    <h2>Cadastre-se</h2>
    <div class="input-group">
        <label>Escolha um Usuário / ID</label>
        <input type="text" id="cadUser" placeholder="Ex: trader01">
    </div>
    <div class="input-group">
        <label>Crie uma Senha</label>
        <input type="password" id="cadPass" placeholder="Digite sua senha">
    </div>
    <button onclick="fazerCadastro()">Criar Conta e Salvar</button>
    <div class="toggle-link" onclick="mostrarLogin()">Já tem uma conta? <span>Faça Login</span></div>
</div>

<script>
    const SUPABASE_URL = "https://fkwkhfkeyfgsqerhpzpm.supabase.co";
    // IMPORTANTE: Use a chave completa que copiou do botão de dois quadradinhos do painel
    const SUPABASE_KEY = "sb_publishable_D35oaRAEby0oZmoUwfhl9A_guti3olcLXasdaS21"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function mostrarCadastro() {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('cadastroBox').style.display = 'block';
    }

    function mostrarLogin() {
        document.getElementById('cadastroBox').style.display = 'none';
        document.getElementById('loginBox').style.display = 'block';
    }

    async function fazerCadastro() {
        const user = document.getElementById('cadUser').value.trim().toLowerCase();
        const pass = document.getElementById('cadPass').value.trim();
        
        if (!user || !pass) return alert('Preencha todos os campos!');
        if (user === 'voxadmin' || user === 'adm') return alert('Nome de usuário reservado pelo sistema.');

        let { data: existe } = await _supabase.from('usuarios').select('username').eq('username', user).maybeSingle();
        if (existe) return alert('Esse usuário já existe no sistema.');

        const { error } = await _supabase.from('usuarios').insert([{ username: user, password: pass, saldo: 0 }]);
        if(error) return alert('Erro ao cadastrar: ' + error.message);
        
        alert('Conta de membro criada com sucesso!');
        mostrarLogin();
    }

    async function fazerLogin() {
        const user = document.getElementById('loginUser').value.trim().toLowerCase();
        const pass = document.getElementById('loginPass').value.trim();

        if (!user || !pass) return alert('Preencha os campos!');

        // 🔒 CONTA ÚNICA DO ADMINISTRADOR EXCLUSIVA
        if (user === 'voxadmin' && pass === 'populi2026#') {
            localStorage.setItem('usuarioLogado', 'voxadmin');
            window.location.href = 'adm.html';
            return;
        }

        let { data: usuario } = await _supabase.from('usuarios').select('*').eq('username', user).maybeSingle();

        if (usuario && usuario.password === pass) {
            localStorage.setItem('usuarioLogado', user);
            window.location.href = 'dashboard.html';
        } else {
            alert('Usuário ou senha incorretos!');
        }
    }
</script>
</body>
</html>
