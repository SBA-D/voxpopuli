<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VoxPopuli Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div style="max-width: 400px; margin: 50px auto; font-family: sans-serif; background: #111827; color: white; padding: 30px; border-radius: 10px;">
        <h2 id="titulo" style="text-align: center;">VoxPopuli Login</h2>
        <input type="text" id="user" placeholder="ID" style="width:100%; padding:10px; margin:10px 0;"><br>
        <input type="password" id="pass" placeholder="Senha" style="width:100%; padding:10px; margin:10px 0;"><br>
        <button id="btn" onclick="logar()" style="width:100%; padding:10px; background:blue; color:white; border:none; cursor:pointer;">Entrar</button>
        <p id="link" onclick="mudar()" style="text-align: center; cursor: pointer; color: gray; margin-top: 15px;">Cadastrar-se aqui</p>
    </div>

    <script>
        const supabase = supabase.createClient("https://xxxzluqjgqwkpzjjxpbj.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4eHpsdXFqZ3F3a3B6amp4cGJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MTA2NjcsImV4cCI6MjA5ODE4NjY2N30.VzGPY5L8EhKt7-ARJaShpM6mMl8kA2tlRG_S4dtUPzc");
        let modo = 'login';

        function mudar() {
            modo = (modo === 'login') ? 'cadastro' : 'login';
            document.getElementById('titulo').innerText = (modo === 'login') ? 'VoxPopuli Login' : 'Criar Conta';
            document.getElementById('btn').innerText = (modo === 'login') ? 'Entrar' : 'Cadastrar';
            document.getElementById('link').innerText = (modo === 'login') ? 'Cadastrar-se aqui' : 'Já tem conta?';
        }

        async function logar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            if(modo === 'login') {
                const { data } = await supabase.from('membros').select('*').eq('id', u).single();
                if(data && data.senha === p) { localStorage.setItem('vox_usuario', u); window.location.href = 'dashboard.html'; }
                else { alert('Erro no login'); }
            } else {
                await supabase.from('membros').insert([{ id: u, senha: p, saldo: 100 }]);
                alert('Cadastrado! Agora faça login.');
                mudar();
            }
        }
    </script>
</body>
</html>
