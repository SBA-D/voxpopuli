<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Usuário</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121214; color: #fff; margin: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #202024; padding: 15px; border-radius: 8px; }
        .card { background: #202024; padding: 20px; margin-top: 20px; border-radius: 8px; }
        .enquete-item { background: #29292e; padding: 15px; margin: 10px 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 8px 15px; background: #00b37e; border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold;}
        button.btn-sub { background: #f75a68; }
        select, input { padding: 8px; background: #121214; color: white; border: 1px solid #29292e; border-radius: 4px; }
        .flex-btn { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h2>Olá, <span id="nomeUsuario">...</span></h2>
    <h3>Saldo: <span id="saldoUsuario">0</span> Moedas</h3>
    <button onclick="logout()" style="background:#f75a68;">Sair</button>
</div>

<div class="card">
    <h3>Financeiro</h3>
    <button onclick="comprarMoedas()">Comprar Moedas (Simular PIX)</button>
    <input type="number" id="valSaque" placeholder="Valor Mínimo 10" style="width: 120px;">
    <button class="btn-sub" onclick="solicitarSaque()">Solicitar Saque</button>
</div>

<div class="card">
    <h3>📊 Enquetes Disponíveis (Custo: 1 Moeda por aposta)</h3>
    <h4>Mercado Financeiro (Acima ou Abaixo do fechamento anterior)</h4>
    <div id="listaFinancas"></div>

    <h4 style="margin-top:30px;">⚽ Esportes (Quem vai vencer?)</h4>
    <div id="listaEsportes"></div>
</div>

<script>
    const usuarioLogado = localStorage.getItem('usuarioLogado');
    if(!usuarioLogado) window.location.href = 'index.html';

    function atualizarDados() {
        document.getElementById('nomeUsuario').innerText = usuarioLogado;
        let users = JSON.parse(localStorage.getItem('users'));
        document.getElementById('saldoUsuario').innerText = users[usuarioLogado].saldo;
        carregarEnquetes();
    }

    function comprarMoedas() {
        let valor = prompt("Quantas moedas deseja comprar via PIX? (1 Real = 1 Moeda)");
        valor = parseInt(valor);
        if(isNaN(valor) || valor <= 0) return alert("Valor inválido.");

        alert(`Chave Copia e Cola PIX Gerada para ${valor} moedas. Simulando pagamento realizado!`);
        let users = JSON.parse(localStorage.getItem('users'));
        users[usuarioLogado].saldo += valor;
        localStorage.setItem('users', JSON.stringify(users));
        atualizarDados();
    }

    function solicitarSaque() {
        const valor = parseInt(document.getElementById('valSaque').value);
        let users = JSON.parse(localStorage.getItem('users'));
        
        if(isNaN(valor) || valor < 10) return alert("O valor mínimo estipulado para saque é 10 moedas.");
        if(users[usuarioLogado].saldo < valor) return alert("Saldo insuficiente.");

        // Desconta provisoriamente do saldo e envia pedido ao ADM
        users[usuarioLogado].saldo -= valor;
        localStorage.setItem('users', JSON.stringify(users));

        let saques = JSON.parse(localStorage.getItem('saques')) || [];
        saques.push({ usuario: usuarioLogado, valor: valor, status: 'Pendente' });
        localStorage.setItem('saques', JSON.stringify(saques));

        alert("Solicitação de saque enviada para a administração!");
        atualizarDados();
    }

    function carregarEnquetes() {
        const enquetes = JSON.parse(localStorage.getItem('enquetes')) || [];
        const finDiv = document.getElementById('listaFinancas');
        const espDiv = document.getElementById('listaEsportes');
        finDiv.innerHTML = ''; espDiv.innerHTML = '';

        enquetes.forEach((enq, index) => {
            const html = `
                <div class="enquete-item">
                    <span><strong>${enq.ativo}</strong> - ${enq.pergunta || 'Quem vence?'}</span>
                    <div class="flex-btn">
                        <button onclick="apostar(${index}, '${enq.op1}')">${enq.op1}</button>
                        <button onclick="apostar(${index}, '${enq.op2}')">${enq.op2}</button>
                    </div>
                </div>
            `;
            if(enq.tipo === 'financeiro') finDiv.innerHTML += html;
            else espDiv.innerHTML += html;
        });
    }

    function apostar(index, opcao) {
        let users = JSON.parse(localStorage.getItem('users'));
        if(users[usuarioLogado].saldo < 1) return alert("Você precisa de pelo menos 1 moeda para apostar!");

        users[usuarioLogado].saldo -= 1;
        localStorage.setItem('users', JSON.stringify(users));

        let enquetes = JSON.parse(localStorage.getItem('enquetes'));
        let apostas = JSON.parse(localStorage.getItem('apostas')) || [];
        
        apostas.push({ usuario: usuarioLogado, ativo: enquetes[index].ativo, palpite: opcao });
        localStorage.setItem('apostas', JSON.stringify(apostas));

        alert(`Aposta confirmada em ${opcao}!`);
        atualizarDados();
    }

    function logout() {
        localStorage.removeItem('usuarioLogado');
        window.location.href = 'index.html';
    }

    atualizarDados();
</script>
</body>
</html>
