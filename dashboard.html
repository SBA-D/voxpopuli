<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPopuli - Trader Painel</title>
    <style>
        :root { --bg: #0b0f19; --card: #111827; --blue: #2563eb; --green: #10b981; --text: #f3f4f6; --border: #374151; --red: #ef4444; --yellow: #f59e0b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 24px; font-weight: bold; color: #3b82f6; }
        .tabs { display: flex; gap: 10px; margin: 20px 0; }
        .tab-btn { background: #1f2937; border: none; padding: 10px 20px; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; }
        .tab-btn.active { background: var(--blue); }
        .ativo-card { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid var(--border); }
        .btn-acao { padding: 8px 14px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-sair { background: #374151; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        /* Tabela de histórico e modal omitidos para brevidade, mantenha os seus originais */
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
    <div class="logo">VoxPopuli 📈</div>
    <div>
        Saldo: <b id="txt-saldo" style="color:var(--green)">0.00</b> Moedas 
        <button class="btn-sair" onclick="deslogar()">Sair</button>
    </div>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="filtrar('Mercado Financeiro', this)">📈 Mercado Financeiro</button>
    <button class="tab-btn" onclick="filtrar('Esporte', this)">⚽ Esporte</button>
</div>

<div id="lista-previsoes"></div>

<!-- ... (Mantenha o resto do seu HTML original de Histórico e Modal aqui embaixo) ... -->

<script>
    // ... (Mantenha suas variáveis de configuração e funções Supabase) ...

    function filtrar(cat, btn) { 
        categoriaAtual = cat; 
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
        btn.classList.add('active'); 
        carregarDados(); 
    }

    // A lógica de carregar e apostar permanece a mesma, pois o backend (Supabase) 
    // é quem vai processar o rateio do prêmio depois.
    async function apostar(id, op, nomeOpcao) {
        const qInput = prompt(`Quantas moedas deseja injetar em "${nomeOpcao}"?`); 
        const q = parseFloat(qInput);
        if(!q || q > saldoAtual) { alert("Saldo insuficiente ou valor inválido."); return; }
        
        await clientSupabase.from('historico_apostas').insert([{ membro_id: usuarioLogado, enquete_id: id.toString(), opcao_escolhida: op.toString(), valor_total: q }]);
        await clientSupabase.from('membros').update({ saldo: saldoAtual - q }).eq('id', usuarioLogado);
        alert(`Aposta confirmada!`); 
        carregarDados();
    }
</script>
</body>
</html>
