<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VoxPopuli - Trader Painel</title>
    <style>
        :root { --bg: #0b0f19; --card: #111827; --blue: #2563eb; --green: #10b981; --text: #f3f4f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #374151; padding-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; }
        .tab-btn { background: #1f2937; border: none; padding: 10px 15px; color: white; border-radius: 6px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--blue); }
        .ativo-card { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #374151; }
        .btn-acao { padding: 8px 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .btn-analise { background: #6b7280; color: white; margin-right: 10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
    <div class="logo">VoxPopuli 📈</div>
    <div>Saldo: <b id="txt-saldo" style="color:var(--green)">...</b> <button onclick="comprarMoedas()" style="margin-left:10px;">+ Recarregar</button></div>
</header>

<div class="tabs" id="menu-categorias">
    <button class="tab-btn active" onclick="filtrar('Mercado Financeiro', this)">📈 Mercado</button>
    <button class="tab-btn" onclick="filtrar('Política', this)">🏛️ Política</button>
    <button class="tab-btn" onclick="filtrar('Esporte', this)">⚽ Esporte</button>
    <button class="tab-btn" onclick="filtrar('Conhecimentos Gerais', this)">🧠 Gerais</button>
</div>

<div id="lista-previsoes"></div>

<script>
    const clientSupabase = supabase.createClient("https://xxxzluqjgqwkpzjjxpbj.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4eHpsdXFqZ3F3a3B6amp4cGJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MTA2NjcsImV4cCI6MjA5ODE4NjY2N30.VzGPY5L8EhKt7-ARJaShpM6mMl8kA2tlRG_S4dtUPzc");
    let categoriaAtual = "Mercado Financeiro";
    const usuarioLogado = localStorage.getItem('vox_usuario');

    async function carregarDados() {
        const { data: m } = await clientSupabase.from('membros').select('saldo').eq('id', usuarioLogado).single();
        document.getElementById('txt-saldo').innerText = parseFloat(m.saldo).toFixed(2);

        const { data: enq } = await clientSupabase.from('enquetes').select('*').eq('categoria', categoriaAtual);
        const lista = document.getElementById('lista-previsoes');
        lista.innerHTML = "";

        enq.forEach(e => {
            if (categoriaAtual === "Mercado Financeiro") {
                const parts = e.pergunta.split(' [');
                const ativo = parts[0];
                const info = parts[1].replace(']', '').split(' vs '); // info[0] é o preço, info[1] ACIMA, info[2] ABAIXO
                lista.innerHTML += `
                    <div class="ativo-card">
                        <div><b>${ativo}</b><br><small style="color:gray">${info[0]}</small></div>
                        <div>
                            <button class="btn-acao btn-analise" onclick="window.open('https://www.tradingview.com/symbols/${ativo.replace('/','').replace(' ','')}/', '_blank')">Analisar</button>
                            <button class="btn-acao" style="background:var(--green)" onclick="apostar('${e.id}', '1', 10)">ACIMA</button>
                            <button class="btn-acao" style="background:var(--blue)" onclick="apostar('${e.id}', '2', 10)">ABAIXO</button>
                        </div>
                    </div>`;
            } else {
                lista.innerHTML += `<div class="ativo-card"><b>${e.pergunta}</b><button class="btn-acao" onclick="apostar('${e.id}', '1', 10)">Opção 1</button></div>`;
            }
        });
    }

    function filtrar(cat, btn) {
        categoriaAtual = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        carregarDados();
    }

    async function apostar(id, op, valor) {
        const q = prompt("Quantidade de moedas:");
        if(!q) return;
        await clientSupabase.from('historico_apostas').insert([{membro_id: usuarioLogado, enquete_id: id, opcao_escolhida: op, valor_total: q}]);
        alert("Palpite registrado!");
    }

    function comprarMoedas() {
        const q = prompt("Qtd para carregar (mín 9):");
        if(q >= 9) clientSupabase.from('pedidos_recarga').insert([{membro_id: usuarioLogado, quantidade_moedas: q, status: 'pendente'}]);
    }

    carregarDados();
</script>
</body>
</html>
