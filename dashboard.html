<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPopuli - Dashboard do Membro</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #060913; 
            color: #fff; 
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #0d1222; 
            padding: 15px 20px; 
            border-bottom: 1px solid #1a2238;
        }
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: #4371f7;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .moedas-badge {
            background: #091a18;
            border: 1px solid #00b37e;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            color: #00b37e;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-blue {
            background: #0640df;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-blue:hover { background: #022cb3; }
        .btn-exit {
            background: #202431;
            color: #7d859a;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-exit:hover { background: #2c3246; color: #fff; }
        
        .main-content {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card { 
            background: #0d1222; 
            padding: 20px; 
            margin-top: 20px; 
            border-radius: 12px; 
            border: 1px solid #1a2238;
        }
        .card h3 {
            margin-top: 0;
            font-size: 14px;
            margin-bottom: 15px;
            color: #7d859a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-inline {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        input, select { 
            flex: 1;
            padding: 12px; 
            background: #111728; 
            color: white; 
            border: 1px solid #1c253d; 
            border-radius: 8px; 
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus, select:focus { outline: none; border-color: #4371f7; }

        /* Estilo das Abas de Seleção de Categoria */
        .category-selector {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .tab-btn {
            flex: 1;
            background: #111728;
            border: 1px solid #1c253d;
            color: #7d859a;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #0640df;
            border-color: #4371f7;
            color: white;
        }
        
        .enquete-box {
            background: #0d1222;
            border: 1px solid #1a2238;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .enquete-badge {
            color: #4371f7;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }
        .enquete-pergunta {
            font-size: 16px;
            font-weight: normal;
            color: #7d859a;
            margin-bottom: 10px;
        }
        .enquete-ativo {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff;
        }
        .opcao-btn {
            background: #111728;
            border: 1px solid #1c253d;
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
        }
        .opcao-btn:hover {
            border-color: #4371f7;
            background: #151d33;
        }
        
        .tempo-container {
            border: 1px solid #f75a68;
            background: #221114;
            border-radius: 8px;
            padding: 10px;
            margin-top: 15px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }
        .tempo-titulo {
            color: #f75a68;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .timer {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<!-- TOPO DO SITE -->
<div class="header">
    <div class="logo-text">VoxPopuli <span>📈</span></div>
    <div class="header-right">
        <div class="moedas-badge">
            🪙 <span id="saldoUsuario">0.00</span> Moedas
        </div>
        <button class="btn-blue" onclick="comprarMoedas()">+ Comprar Moedas</button>
        <button class="btn-exit" onclick="logout()">Sair</button>
    </div>
</div>

<div class="main-content">

    <!-- SEÇÃO DE SAQUE -->
    <div class="card">
        <h3>💰 Solicitar Saque</h3>
        <div class="input-inline">
            <input type="number" id="valSaque" placeholder="Mínimo 10 moedas">
            <button class="btn-blue" style="background: #df0618;" onclick="solicitarSaque()">Pedir Saque</button>
        </div>
    </div>

    <!-- SELEÇÃO DE CATEGORIAS PRINCIPAIS -->
    <div class="category-selector">
        <button class="tab-btn active" id="tabFinanceiro" onclick="mudarCategoria('financeiro')">📊 Mercado Financeiro</button>
        <button class="tab-btn" id="tabEsportes" onclick="mudarCategoria('esportes')">⚽ Esportes</button>
    </div>

    <!-- SUB-CARD: FILTRO DE ATIVOS (SÓ APARECE EM MERCADO FINANCEIRO) -->
    <div class="card" id="filtroAtivosCard">
        <h3>🔍 Selecionar Ativo para Analisar</h3>
        <select id="selectAtivo" onchange="filtrarPorAtivo()">
            <option value="todos">-- Mostrar Todos os Ativos Ativos --</option>
            <!-- Você pode deletar ou adicionar mais opções aqui facilmente -->
            <option value="EUR/USD">Forex: EUR/USD</option>
            <option value="BTC/USDT">Cripto: BTC/USDT</option>
            <option value="ETH/USDT">Cripto: ETH/USDT</option>
            <option value="PETR4">Ações: PETR4 (Petrobras)</option>
            <option value="VALE3">Ações: VALE3 (Vale)</option>
            <option value="WIN">Índice: WIN (Mini Índice)</option>
            <option value="WDO">Dólar: WDO (Mini Dólar)</option>
        </select>
    </div>

    <!-- LISTA DE PREVISÕES ATIVAS -->
    <h2 style="margin-top: 30px; font-size: 22px; font-weight: 600;" id="tituloPrevisoes">Previsões: Mercado Financeiro</h2>
    
    <div id="containerEnquetes">
        <!-- As enquetes injetadas dinamicamente aparecem aqui -->
    </div>

</div>

<script>
    const usuarioLogado = localStorage.getItem('usuarioLogado');
    if(!usuarioLogado) window.location.href = 'index.html';

    let categoriaAtual = 'financeiro';

    function atualizarDados() {
        let users = JSON.parse(localStorage.getItem('users')) || {};
        if(users[usuarioLogado]) {
            document.getElementById('saldoUsuario').innerText = Number(users[usuarioLogado].saldo).toFixed(2);
        }
        carregarEnquetes();
    }

    // Gerencia a troca de abas principais
    function mudarCategoria(categoria) {
        categoriaAtual = categoria;
        
        document.getElementById('tabFinanceiro').classList.remove('active');
        document.getElementById('tabEsportes').classList.remove('active');
        
        if(categoria === 'financeiro') {
            document.getElementById('tabFinanceiro').classList.add('active');
            document.getElementById('filtroAtivosCard').style.display = 'block';
            document.getElementById('tituloPrevisoes').innerText = "Previsões: Mercado Financeiro";
        } else {
            document.getElementById('tabEsportes').classList.add('active');
            document.getElementById('filtroAtivosCard').style.display = 'none';
            document.getElementById('tituloPrevisoes').innerText = "Previsões: Esportes";
        }
        carregarEnquetes();
    }

    function filtrarPorAtivo() {
        carregarEnquetes();
    }

    function carregarEnquetes() {
        const enquetes = JSON.parse(localStorage.getItem('enquetes')) || [];
        const container = document.getElementById('containerEnquetes');
        const ativoFiltrado = document.getElementById('selectAtivo').value;
        
        // Filtra as enquetes com base na aba e no select de ativo
        let enquetesFiltradas = enquetes.filter(enq => enq.tipo === categoriaAtual);
        
        if(categoriaAtual === 'financeiro' && ativoFiltrado !== 'todos') {
            enquetesFiltradas = enquetesFiltradas.filter(enq => enq.ativo === ativoFiltrado);
        }

        if(enquetesFiltradas.length === 0) {
            container.innerHTML = `
                <div class="enquete-box">
                    <span class="enquete-badge">Aguardando Palpites...</span>
                    <div class="enquete-pergunta">Nenhuma enquete ativa nesta categoria no momento.</div>
                </div>
            `;
            return;
        }

        container.innerHTML = '';
        enquetesFiltradas.forEach((enq, index) => {
            let perguntaTexto = "";
            
            if(enq.tipo === 'financeiro') {
                perguntaTexto = "O ativo fechará o dia acima ou abaixo do preço de fechamento do dia anterior?";
            } else {
                perguntaTexto = "Quem vence o confronto?";
            }

            container.innerHTML += `
                <div class="enquete-box">
                    <span class="enquete-badge">🔥 ENQUETE EM ANDAMENTO</span>
                    <div class="enquete-pergunta">${perguntaTexto}</div>
                    <div class="enquete-ativo">${enq.ativo}</div>
                    
                    <button class="opcao-btn" onclick="apostar(${index}, '${enq.op1}')">
                        <span>${enq.op1}</span> <span>--</span>
                    </button>
                    
                    <button class="opcao-btn" onclick="apostar(${index}, '${enq.op2}')">
                        <span>${enq.op2}</span> <span>--</span>
                    </button>
                    
                    <div class="tempo-container">
                        <div class="tempo-titulo">⏱️ TEMPO RESTANTE</div>
                        <div class="timer">00:00:00</div>
                    </div>
                </div>
            `;
        });
    }

    function apostar(index, opcao) {
        let users = JSON.parse(localStorage.getItem('users'));
        if(users[usuarioLogado].saldo < 1) return alert("Você precisa de pelo menos 1 moeda de saldo para responder!");

        users[usuarioLogado].saldo -= 1;
        localStorage.setItem('users', JSON.stringify(users));

        alert(`Aposta de 1 moeda confirmada em: ${opcao}!`);
        atualizarDados();
    }

    function comprarMoedas() {
        let valor = prompt("Quantas moedas deseja comprar via PIX? (1 Real = 1 Moeda)");
        valor = parseInt(valor);
        if(isNaN(valor) || valor <= 0) return alert("Valor inválido.");

        alert(`Chave PIX gerada. Pagamento de ${valor} moedas simulado com sucesso!`);
        let users = JSON.parse(localStorage.getItem('users'));
        users[usuarioLogado].saldo += valor;
        localStorage.setItem('users', JSON.stringify(users));
        atualizarDados();
    }

    function solicitarSaque() {
        const valor = parseInt(document.getElementById('valSaque').value);
        let users = JSON.parse(localStorage.getItem('users'));
        
        if(isNaN(valor) || valor < 10) return alert("O valor mínimo para saque é de 10 moedas.");
        if(users[usuarioLogado].saldo < valor) return alert("Saldo insuficiente.");

        users[usuarioLogado].saldo -= valor;
        localStorage.setItem('users', JSON.stringify(users));

        let saques = JSON.parse(localStorage.getItem('saques')) || [];
        saques.push({ usuario: usuarioLogado, valor: valor, status: 'Pendente' });
        localStorage.setItem('saques', JSON.stringify(saques));

        alert("Pedido de saque enviado para o ADM!");
        document.getElementById('valSaque').value = '';
        atualizarDados();
    }

    function logout() {
        localStorage.removeItem('usuarioLogado');
        window.location.href = 'index.html';
    }

    // Inicializa a tela com os dados
    atualizarDados();
</script>
</body>
</html>
