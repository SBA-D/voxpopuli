<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPopuli - Dashboard</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #111827;
            --primary-blue: #2563eb;
            --accent-green: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 24px; font-weight: bold; color: #3b82f6; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .saldo-wrapper { display: flex; align-items: center; gap: 10px; }
        .saldo-badge { background: rgba(16, 185, 129, 0.2); border: 1px solid var(--accent-green); color: var(--accent-green); padding: 8px 16px; border-radius: 20px; font-weight: bold; }
        .btn-comprar { background: var(--primary-blue); color: white; border: none; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-comprar:hover { background: #1d4ed8; }
        .btn-sair { background: #374151; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .container { max-width: 800px; margin: 40px auto; }
        h2 { text-align: center; margin-bottom: 30px; color: var(--text-muted); }
        .enquete-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .botoes-voto { display: flex; gap: 20px; margin-top: 20px; }
        .btn-voto { flex: 1; padding: 12px; border: 1px solid var(--primary-blue); background: transparent; color: white; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .btn-voto:hover { background: var(--primary-blue); }
        .painel-aposta { margin-top: 15px; background: #1f2937; padding: 15px; border-radius: 6px; display: none; }
        .input-moedas { padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: #0b0f19; color: white; width: 100px; margin-right: 10px; }
        .btn-confirmar { background: var(--accent-green); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <div class="logo">VoxPopuli</div>
        <div class="user-info">
            <div class="saldo-wrapper">
                <span class="saldo-badge" id="txt-saldo">... Moedas</span>
                <button class="btn-comprar" onclick="comprarMoedas()">+ Recarregar</button>
            </div>
            <button class="btn-sair" onclick="deslogar()">Sair</button>
        </div>
    </header>

    <div class="container">
        <h2>Previsões Ativas</h2>
        <div id="lista-enquetes"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://xxxzluqjgqwkpzjjxpbj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4eHpsdXFqZ3F3a3B6amp4cGJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MTA2NjcsImV4cCI6MjA5ODE4NjY2N30.VzGPY5L8EhKt7-ARJaShpM6mMl8kA2tlRG_S4dtUPzc";
        
        const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const usuarioLogado = localStorage.getItem('vox_usuario');
        let saldoAtual = 0;

        if (!usuarioLogado) { window.location.href = 'index.html'; }

        function deslogar() {
            localStorage.removeItem('vox_usuario');
            window.location.href = 'index.html';
        }

        async function carregarDados() {
            try {
                const { data: membro } = await clientSupabase.from('membros').select('saldo').eq('id', usuarioLogado).maybeSingle();
                if (membro) {
                    saldoAtual = parseFloat(membro.saldo);
                    document.getElementById('txt-saldo').innerText = saldoAtual.toFixed(2) + " Moedas";
                }

                const { data: enquetes } = await clientSupabase.from('enquetes').select('*');
                const lista = document.getElementById('lista-enquetes');
                lista.innerHTML = "";

                if (!enquetes || enquetes.length === 0) {
                    lista.innerHTML = "<p style='text-align:center; color:gray;'>Nenhuma enquete ativa no momento.</p>";
                    return;
                }

                enquetes.forEach(enq => {
                    let o1 = "Opção 1", o2 = "Opção 2";
                    let perguntaExibida = enq.pergunta;

                    if (enq.pergunta.includes("[") && enq.pergunta.includes("vs")) {
                        try {
                            const partes = enq.pergunta.split(" [");
                            perguntaExibida = partes[0];
                            const opcoesRaw = partes[1].replace("]", "").split(" vs ");
                            o1 = opcoesRaw[0]; o2 = opcoesRaw[1];
                        } catch(e){}
                    }

                    lista.innerHTML += `
                        <div class="enquete-card">
                            <h3 style="margin-bottom:15px;">${perguntaExibida}</h3>
                            <div class="botoes-voto">
                                <button class="btn-voto" onclick="abrirPainelAposta('${enq.id}', '1', '${o1}')">${o1}</button>
                                <button class="btn-voto" onclick="abrirPainelAposta('${enq.id}', '2', '${o2}')">${o2}</button>
                            </div>
                            <div class="painel-aposta" id="painel-${enq.id}">
                                <p style="margin-bottom: 10px; color: var(--text-muted);">Injetar moedas em: <b id="nome-op-${enq.id}" style="color:white;"></b></p>
                                <input type="number" class="input-moedas" id="input-${enq.id}" min="1" placeholder="Qtd">
                                <button class="btn-confirmar" onclick="confirmarAposta('${enq.id}')">Confirmar Injeção</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        let apostaSelecionada = {};

        function abrirPainelAposta(enqueteId, opcaoNum, nomeOpcao) {
            document.getElementById(`painel-${enqueteId}`).style.display = "block";
            document.getElementById(`nome-op-${enqueteId}`).innerText = nomeOpcao;
            apostaSelecionada[enqueteId] = { opcaoNum: opcaoNum, nome: nomeOpcao };
        }

        async function confirmarAposta(enqueteId) {
            const qtdInput = document.getElementById(`input-${enqueteId}`).value;
            const qtd = parseFloat(qtdInput);

            if (isNaN(qtd) || qtd <= 0) { alert("Digite um valor válido!"); return; }
            if (qtd > saldoAtual) { alert("Saldo insuficiente!"); return; }

            const opInfo = apostaSelecionada[enqueteId];
            
            const { error } = await clientSupabase.from('historico_apostas').insert([{
                membro_id: usuarioLogado,
                enquete_id: enqueteId.toString(),
                opcao_escolhida: opInfo.opcaoNum.toString(),
                valor_total: qtd
            }]);

            if (error) {
                alert("Erro ao salvar aposta no banco: " + error.message);
                return;
            }

            const novoSaldo = saldoAtual - qtd;
            await clientSupabase.from('membros').update({ saldo: novoSaldo }).eq('id', usuarioLogado);

            alert(`Injeção realizada!\n70% (R$ ${(qtd*0.7).toFixed(2)}) alocados em: ${opInfo.nome}\n30% (R$ ${(qtd*0.3).toFixed(2)}) na outra opção.`);
            document.getElementById(`painel-${enqueteId}`).style.display = "none";
            carregarDados();
        }

        // FUNÇÃO DE RECARGA CORRIGIDA E INSERIDA DENTRO DO SCRIPT
        async function comprarMoedas() {
            // INSIRA SEU WHATSAPP DE ADM AQUI (Exemplo: "5521999999999")
            const TELEFONE_ADM = "55XXXXXXXXXXX"; 

            const quantidade = prompt("Quantas moedas deseja recarregar?\n(Mínimo de 9 moedas = R$ 9,00)");
            const qtdNum = parseFloat(quantidade);

            if (isNaN(qtdNum) || qtdNum < 9) {
                alert("Valor inválido! A recarga mínima é de 9 moedas (R$ 9,00).");
                return;
            }

            // Injeta o pedido como pendente na tabela do banco
            const { error } = await clientSupabase
                .from('pedidos_recarga')
                .insert([{
                    membro_id: usuarioLogado.toString(),
                    quantidade_moedas: qtdNum,
                    status: 'pendente'
                }]);

            if (error) {
                alert("Erro ao gerar solicitação: " + error.message);
                return;
            }

            alert("Solicitação registrada! Agora envie o comprovante no WhatsApp do Administrador para liberação do saldo.");

            const mensagem = encodeURIComponent(
                `Olá Administrador!\n\n` +
                `Solicitei uma recarga no VoxPopuli:\n` +
                `👤 ID do Membro: ${usuarioLogado}\n` +
                `💰 Quantidade: ${qtdNum} moedas\n` +
                `💵 Valor Pago: R$ ${qtdNum.toFixed(2)}\n\n` +
                `Aguardando aprovação no painel!`
            );

            window.open(`https://api.whatsapp.com/send?phone=${TELEFONE_ADM}&text=${mensagem}`, '_blank');
        }

        carregarDados();
    </script>
</body>
</html>
