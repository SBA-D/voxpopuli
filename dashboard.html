<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPopuli - Premium Member Dashboard</title>
    <style>
        :root {
            --bg-main: #060913;
            --bg-card: #0d1222;
            --bg-input: #111728;
            --border-color: #1a2238;
            --accent-blue: #4371f7;
            --accent-green: #00b37e;
            --accent-red: #f75a68;
            --text-muted: #7d859a;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-main); color: #fff; margin: 0; padding: 0; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 15px 24px; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .moedas-badge { background: #091a18; border: 1px solid var(--accent-green); padding: 10px 18px; border-radius: 30px; font-size: 14px; color: var(--accent-green); font-weight: 700; }
        .main-content { padding: 24px; max-width: 850px; margin: 0 auto; }
        .card { background: var(--bg-card); padding: 24px; margin-top: 20px; border-radius: 16px; border: 1px solid var(--border-color); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        input, select { width: 100%; padding: 14px; background: var(--bg-input); color: white; border: 1px solid #1c253d; border-radius: 8px; box-sizing: border-box; }
        .category-selector { display: flex; gap: 12px; margin-top: 24px; }
        .tab-btn { flex: 1; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-muted); padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .tab-btn.active { background: #0640df; color: white; }
        .enquete-box { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; margin-top: 20px; display: grid; grid-template-columns: 1fr 220px; gap: 20px; align-items: center; }
        .opcao-btn { width: 100%; background: var(--bg-input); border: 1px solid #1c253d; color: white; padding: 14px; border-radius: 8px; text-align: left; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; }
        .pote-acumulado-marcador { color: #ff9f43; font-weight: bold; font-size: 13px; margin-bottom: 10px; background: #1c253d; display: inline-block; padding: 4px 10px; border-radius: 4px; }
        .timer { font-size: 18px; font-weight: 700; font-family: monospace; color: var(--accent-red); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size:24px; font-weight:800; color:var(--accent-blue);">VoxPopuli 📈</div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="moedas-badge">🪙 <span id="saldoUsuario">0.00</span> Moedas</div>
        <button style="padding:10px; background:#202431; border:none; color:white; border-radius:8px; cursor:pointer;" onclick="localStorage.removeItem('usuarioLogado'); window.location.href='./index.html';">Sair</button>
    </div>
</div>

<div class="main-content">
    <div class="category-selector">
        <button class="tab-btn active" id="tabFinanceiro" onclick="mudarCategoria('financeiro')">📊 Mercado Financeiro</button>
        <button class="tab-btn" id="tabEsportes" onclick="mudarCategoria('esportes')">⚽ Esportes</button>
    </div>

    <div id="containerEnquetes"></div>

    <div class="card">
        <h3>📊 Meu Extrato Histórico</h3>
        <table>
            <thead><tr><th>Data</th><th>Operação</th><th>Detalhes</th><th>Valor</th></tr></thead>
            <tbody id="extratoGeralUsuario"></tbody>
        </table>
    </div>

    <div class="card" id="depositoSection">
        <h3>💳 Adicionar Saldo via PIX (Mínimo R$ 9,00)</h3>
        <div class="grid-inputs" style="grid-template-columns: 1fr auto;">
            <input type="number" id="valDeposito" placeholder="Quantidade">
            <button style="padding:14px; background:var(--accent-green); border:none; border-radius:8px;" onclick="gerarPix()">Gerar PIX</button>
        </div>
        <div id="pixArea" style="display: none; background:#111a30; padding:15px; border-radius:8px; text-align:center; margin-top:10px;">
            <div id="pixCopiaColaTexto" style="font-family:monospace; font-size:11px; word-break:break-all; background:#060913; padding:10px; margin-bottom:10px;"></div>
            <button style="padding:8px; background:var(--accent-blue); color:white; border:none; border-radius:5px;" onclick="navigator.clipboard.writeText(document.getElementById('pixCopiaColaTexto').innerText); alert('Copiado!');">📋 Copiar Código</button>
            <button style="padding:8px; background:var(--accent-green); border:none; border-radius:5px; width:100%; margin-top:10px;" onclick="notificarAdmDep()">✅ Já Paguei! Notificar ADM</button>
        </div>
    </div>
</div>

<script>
    const usuarioLogado = localStorage.getItem('usuarioLogado');
    if(!usuarioLogado) window.location.href = './index.html';

    let categoriaAtual = 'financeiro';
    let valorGeradoAtual = 0;

    function atualizarDados() {
        let users = JSON.parse(localStorage.getItem('users')) || {};
        if(users[usuarioLogado]) {
            document.getElementById('saldoUsuario').innerText = Number(users[usuarioLogado].saldo || 0).toFixed(2);
        }
        carregarEnquetes();
        renderizarExtrato();
    }

    function mudarCategoria(cat) {
        categoriaAtual = cat;
        document.getElementById('tabFinanceiro').classList.remove('active');
        document.getElementById('tabEsportes').classList.remove('active');
        document.getElementById(cat === 'financeiro' ? 'tabFinanceiro' : 'tabEsportes').classList.add('active');
        carregarEnquetes();
    }

    function carregarEnquetes() {
        const enquetes = JSON.parse(localStorage.getItem('enquetes')) || [];
        const apostas = JSON.parse(localStorage.getItem('apostas')) || [];
        const container = document.getElementById('containerEnquetes');
        
        let filtradas = enquetes.filter(enq => {
            let expirado = new Date(`${enq.dataFim}T${enq.horaFim}`).getTime() - new Date().getTime() <= 0;
            return enq.tipo === categoriaAtual && !enq.finalizada && !expirado;
        });
        
        if(filtradas.length === 0) {
            container.innerHTML = `<div class="card" style="text-align:center; color:var(--text-muted);">Nenhum mercado ativo no momento.</div>`;
            return;
        }

        container.innerHTML = '';
        filtradas.forEach(enq => {
            // Calcular dinamicamente o pote arrecadado de todas as apostas para exibir na vitrine do membro
            let volumePote = 0;
            apostas.forEach(a => { if(a.enqueteId === enq.id) volumePote += a.valor; });

            let corpoVotos = enq.pausada 
                ? `<div style="background:#2c1a0a; color:#ff9f43; padding:10px; border-radius:8px; text-align:center;">⏸️ Suspenso Temporariamente</div>`
                : `<button class="opcao-btn" onclick="apostar(${enq.id}, '${enq.op1}')">▲ ${enq.op1}</button>
                   <button class="opcao-btn" onclick="apostar(${enq.id}, '${enq.op2}')">▼ ${enq.op2}</button>`;

            container.innerHTML += `<div class="enquete-box">
                <div>
                    <div class="pote-acumulado-marcador">💰 Lucro Acumulado Coletivo: R$ ${volumePote.toFixed(2)}</div>
                    <div style="font-size:22px; font-weight:800;">${enq.ativo}</div>
                    <p style="color:var(--text-muted); font-size:13px;">Preço Ref: ${enq.precoAlvo || 'N/A'}</p>
                    ${corcorpoVotos || corpoVotos}
                </div>
                <div style="text-align:center; border-left:1px solid var(--border-color); padding-left:15px;">
                    <small style="color:var(--text-muted)">FECHA EM</small>
                    <div class="timer" id="t-${enq.id}">--:--:--</div>
                </div>
            </div>`;
            relogio(enq.dataFim, enq.horaFim, `t-${enq.id}`);
        });
    }

    function relogio(d, h, elId) {
        function r() {
            let el = document.getElementById(elId); if(!el) return;
            let diff = new Date(`${d}T${h}`).getTime() - new Date().getTime();
            if(diff <= 0) { el.innerText = "FECHADO"; return; }
            let hrs = Math.floor(diff / 3600000);
            let mins = Math.floor((diff % 3600000) / 60000);
            let secs = Math.floor((diff % 60000) / 1000);
            el.innerText = `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        }
        setInterval(r, 1000); r();
    }

    function apostar(id, palpite) {
        let users = JSON.parse(localStorage.getItem('users')) || {};
        let qte = prompt("Quantas moedas deseja alocar nesta previsão?", "10");
        let val = parseFloat(qte);

        if(isNaN(val) || val <= 0) return;
        if(!users[usuarioLogado] || users[usuarioLogado].saldo < val) return alert("Saldo insuficiente.");

        users[usuarioLogado].saldo -= val;
        localStorage.setItem('users', JSON.stringify(users));

        let enquetes = JSON.parse(localStorage.getItem('enquetes')) || [];
        let enq = enquetes.find(e => e.id === id);
        let apostas = JSON.parse(localStorage.getItem('apostas')) || [];
        
        apostas.push({ usuario: usuarioLogado, enqueteId: id, ativo: enq.ativo, palpite: palpite, valor: val, status: 'Pendente', lucro: 0, data: new Date().toLocaleString('pt-BR') });
        localStorage.setItem('apostas', JSON.stringify(apostas));
        
        alert("Palpite registrado com sucesso!");
        atualizarDados();
    }

    function gerarPix() {
        const v = parseFloat(document.getElementById('valDeposito').value);
        if(isNaN(v) || v < 9) return alert("Mínimo R$ 9,00.");
        valorGeradoAtual = v;
        document.getElementById('pixCopiaColaTexto').innerText = `00020101021126580014br.gov.bcb.pix0114Ef0ce40a-5e1e-42ef-a2b6-a2d3664491bd5204000053039865405${v.toFixed(2)}5802BR5910VoxPopuli6009Araruama62070503***6304`;
        document.getElementById('pixArea').style.display = 'block';
    }

    function notificarAdmDep() {
        let depositos = JSON.parse(localStorage.getItem('depositos')) || [];
        depositos.push({ usuario: usuarioLogado, valor: valorGeradoAtual, status: 'Pendente', data: new Date().toLocaleString('pt-BR') });
        localStorage.setItem('depositos', JSON.stringify(depositos));
        alert("Notificado!");
        document.getElementById('pixArea').style.display = 'none';
        atualizarDados();
    }

    function renderizarExtrato() {
        const tbody = document.getElementById('extratoGeralUsuario'); tbody.innerHTML = '';
        const apostas = JSON.parse(localStorage.getItem('apostas')) || [];
        apostas.filter(a => a.usuario === usuarioLogado).forEach(a => {
            let statusTexto = a.status === 'Pendente' ? 'Aguardando' : (a.status === 'Venceu' ? `Ganhou! R$ ${a.lucro.toFixed(2)}` : 'Errou');
            tbody.innerHTML += `<tr><td><small>${a.data}</small></td><td>Previsão</td><td>Ativo: ${a.ativo} (Palpite: ${a.palpite}) - Status: ${statusTexto}</td><td style="color:var(--accent-red)">- R$ ${a.valor.toFixed(2)}</td></tr>`;
        });
    }

    atualizarDados();
    setInterval(carregarEnquetes, 10000);
</script>
</body>
</html>
