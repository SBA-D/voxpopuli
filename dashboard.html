<script>
    // 1. Inicializa o cliente Supabase (usando suas credenciais)
    const db = supabase.createClient("https://xxxzluqjgqwkpzjjxpbj.supabase.co", "SUA_CHAVE_ANON_AQUI");

    // 2. Função para carregar e exibir a enquete ativa
    async function carregarEnquete() {
        const { data, error } = await db.from('enquetes').select('*').eq('status', 'ativa').single();
        if (data) {
            document.getElementById('lista-enquetes').innerHTML = `
                <div class="card-enquete">
                    <h3>${data.pergunta}</h3>
                    <button onclick="apostar('${data.id}', 'opcao1')">Subir</button>
                    <button onclick="apostar('${data.id}', 'opcao2')">Descer</button>
                </div>
            `;
        }
    }

    // 3. Integração Realtime: o painel atualiza sozinho quando o ADM inserir algo
    db.channel('schema-db-changes')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'enquetes' }, payload => {
        carregarEnquete();
      })
      .subscribe();

    // 4. Lógica de aposta do membro
    async function apostar(enqueteId, escolha) {
        const { error } = await db.from('apostas').insert([{ enquete_id: enqueteId, escolha: escolha, usuario: localStorage.getItem('vox_usuario') }]);
        if (error) alert("Erro ao apostar.");
        else alert("Aposta registrada!");
    }

    // Carrega a enquete ao abrir a página
    carregarEnquete();
</script>
